{% extends 'base.html' %}

{% block title %}Forgot Password - CampusKart{% endblock %}

{% block content %}
<style>
    .auth-wrapper {
        min-height: calc(100vh - 100px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1rem;
    }
    .auth-card {
        max-width: 450px;
        width: 100%;
        padding: 2.5rem;
    }
    .auth-logo {
        text-align: center;
        margin-bottom: 2rem;
        font-size: 2rem;
        font-weight: 700;
        color: var(--text-main);
    }
    .auth-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: var(--text-main);
    }
    .auth-subtitle {
        color: var(--text-muted);
        margin-bottom: 2rem;
        font-size: 0.95rem;
    }
    .password-status {
        font-size: 0.85rem;
        font-weight: 500;
        margin-top: 0.5rem;
        min-height: 20px;
    }
    .status-success { color: var(--success-color); }
    .status-error { color: var(--danger-color); }
</style>

<div class="auth-wrapper">
    <div class="card-custom auth-card">
        <div class="auth-logo">
            <i class="fas fa-shopping-cart text-main me-2"></i>CampusKart
        </div>
        
        <h2 class="auth-title">Password assistance</h2>
        <p class="auth-subtitle">Verify your account and create a new password.</p>

        <input type="hidden" id="csrfToken" value="{{ csrf_token }}">

        <div class="mb-3">
            <label for="email" class="form-label fw-bold font-size-sm">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your registered email" required>
        </div>

        <div class="mb-3">
            <label for="favoritefood" class="form-label fw-bold font-size-sm">Security Answer: Favorite food?</label>
            <input type="text" id="favoritefood" class="form-control" placeholder="Your answer" required>
        </div>

        <div class="mb-3">
            <label for="newPassword" class="form-label fw-bold font-size-sm">New password</label>
            <input type="password" id="newPassword" class="form-control" placeholder="At least 8 characters" required>
        </div>

        <div class="mb-4">
            <label for="confirmPassword" class="form-label fw-bold font-size-sm">Re-enter password</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your new password" required>
            <div id="passwordMatch" class="password-status"></div>
        </div>

        <div class="d-flex flex-column gap-2">
            <button type="button" class="btn-primary-custom" id="resetPasswordBtn" onclick="resetPassword()" disabled>Save changes</button>
            <a href="{% url 'login' %}" class="btn-outline-custom text-center">Cancel</a>
        </div>
    </div>
</div>

<script>
    const newPasswordInput = document.getElementById("newPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const passwordMatch = document.getElementById("passwordMatch");
    const resetPasswordBtn = document.getElementById("resetPasswordBtn");

    function validatePasswords() {
        const newPass = newPasswordInput.value.trim();
        const confirmPass = confirmPasswordInput.value.trim();

        if (!confirmPass) {
            passwordMatch.innerHTML = "";
            resetPasswordBtn.disabled = true;
            return;
        }

        if (newPass.length < 8) {
            passwordMatch.innerHTML = '<span class="status-error"><i class="fas fa-times me-1"></i>Must be at least 8 characters</span>';
            resetPasswordBtn.disabled = true;
            return;
        }

        if (newPass === confirmPass) {
            passwordMatch.innerHTML = '<span class="status-success"><i class="fas fa-check me-1"></i>Passwords match</span>';
            resetPasswordBtn.disabled = false;
        } else {
            passwordMatch.innerHTML = '<span class="status-error"><i class="fas fa-times me-1"></i>Passwords do not match</span>';
            resetPasswordBtn.disabled = true;
        }
    }

    newPasswordInput.addEventListener("input", validatePasswords);
    confirmPasswordInput.addEventListener("input", validatePasswords);

    function resetPassword() {
        const email = document.getElementById("email").value.trim();
        const favoriteFood = document.getElementById("favoritefood").value.trim();
        const newPass = newPasswordInput.value.trim();
        const confirmPass = confirmPasswordInput.value.trim();
        const csrfToken = document.getElementById("csrfToken").value;

        if (!email || !favoriteFood) {
            alert("Please fill in email and security answer.");
            return;
        }

        if (newPass.length < 8 || newPass !== confirmPass) {
            alert("Please check your passwords.");
            return;
        }

        const formData = new FormData();
        formData.append("email", email);
        formData.append("favorite_food", favoriteFood);
        formData.append("new_password", newPass);
        formData.append("confirm_password", confirmPass);

        fetch("{% url 'forgot_password' %}", {
            method: "POST",
            headers: {
                "X-CSRFToken": csrfToken
            },
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                alert("✅ Password reset successful");
                window.location.href = "{% url 'login' %}";
            } else {
                alert(data.message || "Unable to reset password");
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("Error resetting password");
        });
    }
</script>
{% endblock %}
